<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .auth-card { width: 100%; max-width: 600px; border-radius: 20px; border: none; background: #fff; }
        .hidden { display: none; }
        .form-control, .form-select { border-radius: 8px; padding: 10px; }
        .nav-pills .nav-link { cursor: pointer; color: #555; }
        .nav-pills .nav-link.active { background-color: #0d6efd; color: #fff; }
    </style>
</head>
<body>

<div class="card auth-card shadow-lg p-4 p-md-5">
    <div class="text-center mb-4">
        <h2 id="authTitle" class="fw-bold text-dark">Welcome Back</h2>
        <p id="authSubtitle" class="text-muted">Login to manage your tuitions</p>
    </div>

    <div class="nav nav-pills nav-justified mb-4 border rounded-pill p-1">
        <button class="nav-link active rounded-pill fw-bold" id="loginTab" onclick="showAuth('login')">Login</button>
        <button class="nav-link rounded-pill fw-bold" id="signupTab" onclick="showAuth('signup')">Sign Up</button>
    </div>

    <form id="authForm" method="POST" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label fw-bold">Email Address</label>
            <input type="email" class="form-control" placeholder="example@mail.com" required>
        </div>

        <div id="signupExtra" class="hidden">
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Full Name</label>
                    <input type="text" class="form-control" placeholder="John Doe">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Phone No</label>
                    <input type="text" class="form-control" placeholder="017XXXXXXXX">
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Gender</label>
                    <select class="form-select">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold text-primary">I am a:</label>
                    <select id="roleSelect" class="form-select border-primary" onchange="toggleRoleFields()">
                        <option value="">-- Choose Role --</option>
                        <option value="student">Student/Guardian</option>
                        <option value="teacher">Teacher (Tutor)</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Address</label>
                <input type="text" class="form-control" placeholder="House #, Road #, City">
            </div>

            <div id="studentFields" class="hidden row g-2 mb-3 bg-light p-3 rounded">
                <div class="col-4">
                    <label class="small fw-bold">Class</label>
                    <input type="text" class="form-control form-control-sm" placeholder="e.g. 10">
                </div>
                <div class="col-4">
                    <label class="small fw-bold">Version</label>
                    <select class="form-select form-select-sm"><option>Bangla</option><option>English</option></select>
                </div>
                <div class="col-4">
                    <label class="small fw-bold">Background</label>
                    <input type="text" class="form-control form-control-sm" placeholder="Science">
                </div>
            </div>

            <div id="teacherFields" class="hidden mb-3 bg-light p-3 rounded">
                <div class="row g-2">
                    <div class="col-md-6 mb-2">
                        <label class="small fw-bold">Expected Salary</label>
                        <input type="number" class="form-control form-control-sm" placeholder="5000">
                    </div>
                    <div class="col-md-6 mb-2">
                        <label class="small fw-bold">Status</label>
                        <input type="text" class="form-control form-control-sm" value="Pending" readonly>
                    </div>
                </div>
                <label class="small fw-bold">Bio/Experience</label>
                <textarea class="form-control form-control-sm" rows="2" placeholder="Tell us about yourself"></textarea>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">Password</label>
            <input type="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-2 fw-bold shadow">LOGIN</button>

        <div class="text-center mt-4">
            <span id="toggleText" class="text-muted">Don't have an account?</span>
            <a href="javascript:void(0)" id="toggleLink" class="text-primary fw-bold text-decoration-none ms-1" onclick="toggleAuth()">Sign Up</a>
        </div>
    </form>
</div>

<script>
    let currentMode = 'login';

    function showAuth(mode) {
        currentMode = mode;
        const signupExtra = document.getElementById('signupExtra');
        const authTitle = document.getElementById('authTitle');
        const authSubtitle = document.getElementById('authSubtitle');
        const submitBtn = document.getElementById('submitBtn');
        const toggleText = document.getElementById('toggleText');
        const toggleLink = document.getElementById('toggleLink');
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');

        if (mode === 'signup') {
            signupExtra.classList.remove('hidden');
            authTitle.innerText = "Create Account";
            authSubtitle.innerText = "Join our platform today";
            submitBtn.innerText = "REGISTER NOW";
            toggleText.innerText = "Already have an account?";
            toggleLink.innerText = "Login";
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
        } else {
            signupExtra.classList.add('hidden');
            authTitle.innerText = "Welcome Back";
            authSubtitle.innerText = "Login to manage your tuitions";
            submitBtn.innerText = "LOGIN";
            toggleText.innerText = "Don't have an account?";
            toggleLink.innerText = "Sign Up";
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
        }
    }

    function toggleAuth() {
        showAuth(currentMode === 'login' ? 'signup' : 'login');
    }

    function toggleRoleFields() {
        const role = document.getElementById('roleSelect').value;
        document.getElementById('studentFields').classList.toggle('hidden', role !== 'student');
        document.getElementById('teacherFields').classList.toggle('hidden', role !== 'teacher');
    }
</script>

</body>
</html>
