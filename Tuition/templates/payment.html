<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Form</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f1f5f9;
}

.container{
    width:420px;
    margin:50px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:12px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#16a34a;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
}

button:hover{
    background:#15803d;
}
</style>
</head>

<body>

<div class="container">
    <h2>Payment Form</h2>

    <form>

        <label>Payment ID</label>
        <input type="number" placeholder="Enter Payment ID" required>

        <label>Transaction ID (T_Id)</label>
        <input type="number" placeholder="Enter Transaction ID" required>

        <label>Student ID (S_Id)</label>
        <input type="number" placeholder="Enter Student ID" required>

        <label>Payment Type ID (Tp_Id)</label>
        <input type="number" placeholder="Enter Payment Type ID" required>

        <label>Amount</label>
        <input type="number" step="0.01" placeholder="Enter Amount" required>

        <label>Method</label>
        <select required>
            <option value="">Select Method</option>
            <option>Cash</option>
            <option>Card</option>
            <option>Mobile Banking</option>
        </select>

        <label>Paid Date</label>
        <input type="date" required>

        <label>Status</label>
        <select required>
            <option value="">Select Status</option>
            <option>Paid</option>
            <option>Pending</option>
            <option>Failed</option>
        </select>

        <button type="submit">Submit Payment</button>

    </form>
</div>

</body>
</html>
