<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Reports</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f5f9;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            max-width: 600px;
            margin: auto;
        }

        h2 {
            color: #1e293b;
        }

        label {
            font-size: 14px;
            font-weight: bold;
            display: block;
            margin-top: 12px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #cbd5f5;
            font-size: 14px;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        .btn {
            margin-top: 15px;
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Report an Account</h2>
    <hr>

    <form action="#" method="post">


        <!-- Reporter ID -->
        <label>Reporter ID</label>
        <input type="number" name="reporter_id" required>

        <!-- Reported ID -->
        <label>Reported ID</label>
        <input type="number" name="reported_id" required>

        <!-- Report Type (auto selection) -->
        <label>Issue Type</label>
        <select name="type" required>
            <option value="">Select Issue</option>
            <option value="Abuse">Abuse</option>
            <option value="Spam">Spam</option>
            <option value="Harassment">Harassment</option>
            <option value="Fake Profile">Fake Profile</option>
        </select>

        <!-- Overview (user লিখবে) -->
        <label>Overview</label>
        <textarea name="overview" placeholder="Describe the issue..." required></textarea>

        <!-- Date (auto handled by browser) -->
        <label>Date</label>
        <input type="date" name="date" required>

        <button type="submit" class="btn">Submit Report</button>

    </form>
</div>

</body>
</html>
