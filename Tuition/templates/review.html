<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Form</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f1f5f9;
}

.container{
    width:400px;
    margin:50px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:12px;
    font-weight:bold;
}

input, select, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

textarea{
    height:100px;
    resize:none;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}
</style>
</head>

<body>

<div class="container">
    <h2>Review Form</h2>

    <form>

        <label>Student ID</label>
        <input type="number" placeholder="Enter Student ID">

        <label>Teacher ID</label>
        <input type="number" placeholder="Enter Teacher ID">

        <label>Rating</label>
        <select>
            <option>Select Rating</option>
            <option>1 Star</option>
            <option>2 Star</option>
            <option>3 Star</option>
            <option>4 Star</option>
            <option>5 Star</option>
        </select>

        <label>Comment</label>
        <textarea placeholder="Write comment"></textarea>

        <label>Date</label>
        <input type="date">

        <button type="submit">Submit</button>

    </form>
</div>

</body>
</html>
