<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tuition Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">📚 TuitionHub</a>
    <div class="ms-auto d-flex gap-2 align-items-center">
        {% if user.is_authenticated %}
            <a href="{% url 'notification_list' %}" class="btn btn-outline-warning btn-sm">🔔 Notifications</a>
            <a href="{% url 'inbox' %}" class="btn btn-outline-info btn-sm">✉️ Inbox</a>
            <a href="{% url 'dashboard' %}" class="btn btn-outline-light btn-sm">Dashboard</a>
            <form action="{% url 'user_logout' %}" method="POST" class="d-inline">
                {% csrf_token %}
                <button class="btn btn-danger btn-sm">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'user_login' %}" class="btn btn-outline-light btn-sm">Login</a>
            <a href="{% url 'register' %}" class="btn btn-success btn-sm">Register</a>
        {% endif %}
    </div>
</nav>
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
</body>
</html>
