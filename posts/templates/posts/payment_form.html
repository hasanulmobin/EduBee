{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white text-center">
                <h4> Make Payment</h4>
            </div>
            <div class="card-body">

                <div class="alert alert-info">
                    <strong>Post:</strong> {{ post.subject }} — Class {{ post.s_class }}<br>
                    <strong>Expected Salary:</strong> ৳{{ post.salary }}/month
                </div>

                <form method="POST">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">Confirm Payment</button>
                        <a href="{% url 'post_detail' post.pk %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
